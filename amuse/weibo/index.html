<script>

    $wbImg = document.getElementById("wb_img"),
    $wbTip = document.getElementById("wb_tip"),
    source = "",
    img = "";

function setPublisher() {
    $wbPublisher.src = "http://widget.weibo.com/dialog/publish.php?button=pubilish&language=zh_cn&app_src=" + source + "&default_image=" + img;
    $wbTip.style.display = "block";
    setTimeout(function() {
        $wbTip.style.display = "none";
    }, 2e3);
};

$wbSource.onchange = function() {
    source = this.value;
    setPublisher();
	_hmt.push(['_trackEvent', 'kumibo', 'wb_source', this.getElementsByTagName("option")[this.selectedIndex].textContent || this.getElementsByTagName("option")[this.selectedIndex].innerText, this.value]);
};

$wbImg.onpropertychange = $wbImg.oninput = function() {
    img = this.value;
    setPublisher();
};
})();
</script>
