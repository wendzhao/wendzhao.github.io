<html>
<head>
    <title>Rainy Day</title>
    <style media="screen" type="text/css">
        img { display: none; }
        body { overflow: hidden; }
        #canvas { position: absolute; top: 0px; left: 0px; }
    </style>
    <script src="js/rainyday.js" type="text/javascript"></script>
    <script type="text/javascript">
        function demo() {
            var engine = new RainyDay('canvas','demo2', window.innerWidth, window.innerHeight);
            engine.gravity = engine.GRAVITY_NON_LINEAR;
            engine.trail = engine.TRAIL_DROPS;
            engine.VARIABLE_GRAVITY_ANGLE = Math.PI / 8;
            engine.rain([
                engine.preset(0, 2, 0.5),
                engine.preset(4, 4, 1)
            ], 50);
        }
    </script>
    <audio id="bgaudio" src="http://ezkumadown.qiniudn.com/RainyMood.m4a"></audio>
    <script type="text/javascript">
        document.getElementById('bgaudio').play();
    </script>

</head>
<body onLoad="demo();">
<img id="demo2" src="bg.jpg" />
<div id="cholder">
    <canvas id="canvas"></canvas>
</div>
